<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mini AI Agent</title>
    <style>
      :root {
        --bg: #f5efe4;
        --panel: rgba(255, 251, 245, 0.92);
        --ink: #1f1c17;
        --muted: #6e665d;
        --accent: #1f6f78;
        --accent-2: #f08a5d;
        --border: rgba(31, 28, 23, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(240, 138, 93, 0.22), transparent 30%),
          radial-gradient(circle at bottom right, rgba(31, 111, 120, 0.18), transparent 35%),
          linear-gradient(135deg, #efe3d0, var(--bg));
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .shell {
        width: min(720px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(31, 28, 23, 0.14);
        overflow: hidden;
      }

      .hero {
        padding: 28px 28px 20px;
        border-bottom: 1px solid var(--border);
      }

      .eyebrow {
        margin: 0 0 8px;
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 6vw, 54px);
        line-height: 0.95;
        font-weight: 700;
      }

      .subtitle {
        margin: 12px 0 0;
        max-width: 44ch;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.45;
      }

      .app {
        padding: 24px 28px 28px;
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        font-size: 14px;
        color: var(--muted);
      }

      textarea {
        width: 100%;
        min-height: 132px;
        resize: vertical;
        padding: 16px 18px;
        font: inherit;
        font-size: 20px;
        line-height: 1.4;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.65);
        border: 1px solid var(--border);
        border-radius: 16px;
        outline: none;
      }

      textarea:focus {
        border-color: rgba(31, 111, 120, 0.5);
        box-shadow: 0 0 0 4px rgba(31, 111, 120, 0.12);
      }

      .controls {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 14px 22px;
        font: inherit;
        font-size: 15px;
        cursor: pointer;
        color: white;
        background: linear-gradient(135deg, var(--accent), #124b51);
      }

      button.secondary {
        color: var(--ink);
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid var(--border);
      }

      .result {
        margin-top: 20px;
        padding: 18px;
        border-radius: 18px;
        background: linear-gradient(135deg, rgba(31, 111, 120, 0.08), rgba(240, 138, 93, 0.12));
        border: 1px solid rgba(31, 111, 120, 0.16);
      }

      .result-label {
        margin: 0 0 6px;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--accent);
      }

      #output {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 28px;
        line-height: 1.2;
      }

      #status {
        min-height: 22px;
        margin-top: 12px;
        color: var(--muted);
        font-size: 14px;
      }

      @media (max-width: 640px) {
        .hero,
        .app {
          padding-inline: 18px;
        }

        #output {
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Interactive Mode</p>
        <h1>Uppercase Gateway</h1>
        <p class="subtitle">
          Send a message to the local HTTP endpoint and inspect the uppercase response directly in the browser.
        </p>
      </section>

      <section class="app">
        <form id="message-form">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Type something here">hello world</textarea>

          <div class="controls">
            <button type="submit">Send</button>
            <button type="button" class="secondary" id="clear-btn">Clear</button>
          </div>
        </form>

        <section class="result" aria-live="polite">
          <p class="result-label">Response</p>
          <pre id="output">HELLO WORLD</pre>
        </section>

        <p id="status"></p>
      </section>
    </main>

    <script>
      const form = document.getElementById("message-form");
      const messageInput = document.getElementById("message");
      const output = document.getElementById("output");
      const status = document.getElementById("status");
      const clearBtn = document.getElementById("clear-btn");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        status.textContent = "Sending request...";

        try {
          const response = await fetch("/message", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: messageInput.value }),
          });

          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error || "Request failed");
          }

          output.textContent = payload.message;
          status.textContent = "Response received.";
        } catch (error) {
          output.textContent = "";
          status.textContent = error.message;
        }
      });

      clearBtn.addEventListener("click", () => {
        messageInput.value = "";
        output.textContent = "";
        status.textContent = "";
        messageInput.focus();
      });
    </script>
  </body>
  </html>
